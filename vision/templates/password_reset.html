<!DOCTYPE html>
<html lang="en">
<meta http-equiv="content-type" content="text/html;charset=utf-8" /><!-- /Added by HTTrack -->
{% load static %}
{% include 'includes/head.html' with page_title="Password Reset" %}
<body>
    <div id="__next">
        <main class="page-wrapper">
            <div class="signup-area rainbow-section-gapTop-big" data-black-overlay="2">
                <div class="sign-up-wrapper rainbow-section-gap">
                    <div class="sign-up-box bg-flashlight">
                        <div class="signup-box-top top-flashlight light-xl">
                            <img alt="sign-up logo" width="476" height="158" data-nimg="1" class="boxed-logo-dark"
                                style="color:transparent" src="{% static 'images/boxed-logo5887.png' %}" />
                        </div>
                        <div class="separator-animated animated-true"></div>
                        <div class="signup-box-bottom">
                            <div class="signup-box-content">
                                <h4 class="title">Reser Your Password</h4>
                                <form method="POST">
                                    {% if error %}
                                    <div class="message-container">
                                        <div class="theme-gradient">
                                            {{ error }}
                                        </div>
                                    </div>
                                    {% endif %}
                                    {% csrf_token %}
                                    <div class="input-section new_password">
                                        <div class="icon"><i class="feather-phone"></i></div>
                                        <input type="password" name="new_password" placeholder="Enter New Password"
                                            required />
                                    </div>
                                    <div class="input-section confirm_password">
                                        <div class="icon"><i class="feather-phone"></i></div>
                                        <input type="password" name="confirm_password" placeholder="Enter Confirm Password"
                                            required />
                                    </div>
                                    <div>
                                        <br>
                                        <div class="separator-animated animated-true"></div>
                                    </div>
                                   <button type="submit" class="btn-default">Reset Password</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% include 'includes/footer.html' %}
        </main>
    </div>
    <script id="__NEXT_DATA__" type="application/json"
        crossorigin="">{"props":{"pageProps":{}},"page":"/signin","query":{},"buildId":"z3fr0Pt4NpNNbCVkENhof","nextExport":true,"autoExport":true,"isFallback":false,"scriptLoader":[]}</script>
</body>
</html>
