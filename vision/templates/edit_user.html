{% extends 'base.html' %}
{% load static %}
{% block content %}
<h1>Edit User</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <label>Profile Image</label>
        <div>
            <img id="current_image"
                src="{% if form.instance.profile_image %}{{ form.instance.profile_image }}{% else %}{% static 'images/default.jpg' %}{% endif %}"
                alt="Profile Image"
                onclick="document.getElementById('profile_image').click();"
                onerror="this.src='{% static 'images/default.jpg' %}'"
                style="cursor:pointer; width:100px; height:100px; object-fit:cover; border-radius:50%;">
        </div>
        <input id="profile_image" name="profile_image" type="file" accept="image/*"
            style="display:none;" onchange="previewImage(event)">
    </div>

    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Changes</button>
</form>

<script>
function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function(){
        document.getElementById('current_image').src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>
{% endblock %}
