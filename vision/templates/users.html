{% extends 'vision/navbar.html' %}

{% block content %}
<h1>Users</h1>
<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone No</th>
            <th>Password</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email_id }}</td>
            <td>{{ user.phone_no }}</td>
            <td>{{ user.password }}</td>
            <td>
                <span class="status {% if user.status == 'Active' %}active{% else %}inactive{% endif %}">
                    {{ user.status }}
                </span>
            </td>
            <td>
                <a href="{% url 'edit_user' user.id %}" class="edit-btn">Edit</a>
                <a href="{% url 'delete_user' user.id %}" class="delete-btn">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
