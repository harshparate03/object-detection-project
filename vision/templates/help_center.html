<!DOCTYPE html>
<html lang="en">
<meta http-equiv="content-type" content="text/html;charset=utf-8" /><!-- /Added by HTTrack -->
{% load static %}
{% include 'includes/head.html' with page_title="Help Center" %}
<body>
    <div id="__next">
        <main class="page-wrapper rbt-dashboard-page">
            {% include 'includes/header.html' %}

            <div class="rbt-panel-wrapper d-flex justify-content-center align-items-center" style="min-height: 100vh;">
                <div class="rbt-main-content">
                    <div class="rbt-daynamic-page-content">
                        <div class="rbt-dashboard-content">
                            <div class="banner-area text-center">
                                <div class="settings-area">
                                    <h3 class="title">Help Center</h3>
                                </div>
                            </div>
                            <div class="content-page pb--50 d-flex justify-content-center">
                                <!-- <div class="chat-box-list"> -->
                                    <div class="content">
                                        <div class="single-settings-box contact-box top-flashlight light-xl leftside overflow-hidden">
                                            <h4 class="title mb--30 text-center">Contact Us</h4>
                                            <form id="helpForm" class="rbt-profile-row rbt-default-form row row--15">
                                                {% csrf_token %}
                                                <div class="col-lg-6 col-md-6 col-sm-6 col-12">
                                                    <div class="form-group">
                                                        <label for="name">Name</label>
                                                        <input id="name" type="text" placeholder="Your Name"
                                                            name="name" required />
                                                    </div>
                                                </div>
                                                <div class="col-lg-6 col-md-6 col-sm-6 col-12">
                                                    <div class="form-group">
                                                        <label for="email">Email</label>
                                                        <input id="email" type="email" placeholder="example@gmail.com"
                                                            name="email" required />
                                                        <span id="email-error" class="text-danger"></span>
                                                    </div>
                                                </div>
                                                <div class="col-lg-6 col-md-6 col-sm-6 col-12">
                                                    <div class="form-group">
                                                        <label for="subject">Subject</label>
                                                        <input id="subject" type="text" placeholder="Subject"
                                                            name="subject" required />
                                                    </div>
                                                </div>
                                                <div class="col-lg-6 col-md-6 col-sm-6 col-12">
                                                    <div class="form-group">
                                                        <label for="phone_number">Phone Number</label>
                                                        <input id="phone_number" type="tel" placeholder="9876543210"
                                                            name="phone_number" required />
                                                        <span id="phone-error" class="text-danger"></span>
                                                    </div>
                                                </div>
                                                <div class="col-12">
                                                    <div class="form-group">
                                                        <label for="message">Your message</label>
                                                        <textarea id="message" cols="20" rows="5" placeholder="Your message"
                                                            name="message" maxlength="256" required></textarea>
                                                    </div>
                                                </div>
                                                <div class="col-12 mt--20">
                                                    <div class="form-group mb--0 text-center">
                                                        <button type="submit" class="btn-default">Send message</button>
                                                    </div>
                                                </div>
                                            </form>
                                            <p id="success-message" class="text-success" style="display: none; font-weight: bold;"></p>
                                        </div>
                                    </div>
                                <!-- </div> -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% include 'includes/footer.html' %}
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#helpForm').on('submit', function (event) {
            event.preventDefault();  // Prevent page reload

            $.ajax({
                type: 'POST',
                url: "{% url 'submit_message' %}",
                data: $(this).serialize(),
                success: function (response) {
                    if (response.success) {
                        $('#success-message').text(response.message).show();
                        $('#email-error, #phone-error').text("");
                        $('#helpForm')[0].reset();
                    } else {
                        let errors = response.errors;
                        $('#email-error').text(errors.email ? errors.email[0].message : "");
                        $('#phone-error').text(errors.phone_number ? errors.phone_number[0].message : "");
                        $('#success-message').hide();
                    }
                },
                error: function () {
                    $('#success-message').text("An error occurred! Please try again.").css("color", "red").show();
                }
            });
        });
    </script>
</body>
</html>
