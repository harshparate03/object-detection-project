<!DOCTYPE html>
<html lang="en">
<meta http-equiv="content-type" content="text/html;charset=utf-8" />
{% load static %}
{% include 'includes/head.html' with page_title="Forgot Password" %}
<body>
    <div id="__next">
        <main class="page-wrapper">
            <div class="signup-area rainbow-section-gapTop-big" data-black-overlay="2">
                <div class="sign-up-wrapper rainbow-section-gap">
                    <div class="sign-up-box bg-flashlight">
                        <div class="signup-box-top top-flashlight light-xl">
                            <img alt="sign-up logo" loading="lazy" width="476" height="158" class="boxed-logo-dark"
                                style="color:transparent" src="{% static 'images/boxed-logo5887.png' %}" />
                        </div>
                        <div class="separator-animated animated-true"></div>
                        <div class="signup-box-bottom">
                            <div class="signup-box-content">
                                <h2 class="theme-gradient">Vision</h2>
                                <p class="b1" style="text-align:center; color:#aaa; margin-bottom:5px;">Empowering Insights Through Vision</p>
                                <h4 class="title" style="margin-top:15px;">Forgot Password</h4>
                                <div class="separator-animated animated-true"></div>

                                {% if error %}
                                <div class="message-container" style="margin-bottom:15px;">
                                    <div class="theme-gradient" style="color:#e74c3c; padding:10px; border-radius:6px; background:rgba(231,76,60,0.1); border:1px solid #e74c3c;">
                                        ⚠️ {{ error }}
                                    </div>
                                </div>
                                {% endif %}

                                <form method="POST">
                                    {% csrf_token %}
                                    <div class="input-section phone-section">
                                        <div class="icon"><i class="feather-phone"></i></div>
                                        <input type="text" name="phone_number" placeholder="Enter your phone number (e.g. +91XXXXXXXXXX)" required />
                                    </div>
                                    <div style="margin-top:15px;">
                                        <div class="separator-animated animated-true"></div>
                                    </div>
                                    <button type="submit" class="btn-default" style="width:100%; margin-top:15px;">Send OTP</button>
                                </form>

                                <div class="signup-box-footer" style="margin-top:20px; text-align:center;">
                                    <a class="btn-read-more" href="{% url 'signin' %}"><span>← Back to Sign In</span></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% include 'includes/footer.html' %}
        </main>
    </div>
</body>
</html>
