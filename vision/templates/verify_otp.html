<!DOCTYPE html>
<html lang="en">
<meta http-equiv="content-type" content="text/html;charset=utf-8" /><!-- /Added by HTTrack -->
{% load static %}
{% include 'includes/head.html' with page_title="Verify OTP" %}

<body>
    <div id="__next">
        <main class="page-wrapper">
            <div class="signup-area rainbow-section-gapTop-big">
                <div class="sign-up-wrapper rainbow-section-gap">
                    <div class="sign-up-box bg-flashlight">
                        <div class="signup-box-top top-flashlight light-xl">
                            <img alt="sign-up logo" width="476" height="158" class="boxed-logo-dark"
                                src="{% static 'images/boxed-logo5887.png' %}" />
                        </div>
                        <div class="separator-animated animated-true"></div>
                        <div class="signup-box-bottom">
                            <div class="signup-box-content">
                                <h4 class="title">Enter Your Verification Code</h4>
                                
                                <form method="POST">
                                    {% if error %}
                                    <div class="message-container">
                                        <div class="theme-gradient">
                                            {{ error }}
                                        </div>
                                    </div>
                                    {% endif %}
                                    {% csrf_token %}
                                    <!-- <div class="input-section mail-section">
                                        <div class="icon"><i class="feather-mail"></i></div>
                                        <input type="text" name="otp" id="otp" placeholder="Enter OTP" required />
                                    </div> -->
                                    <div class="input-section mail-section">
                                        <div class="icon"><i class="feather-mail"></i></div>
                                        <input type="text" name="otp" id="otp" placeholder="Enter OTP" required />
                                        <!-- {{ form.email }} -->
                                    </div>
                                    <div>
                                        <br>
                                        <div class="separator-animated animated-true"></div>
                                    </div>

                                    <button type="submit" class="btn-default">Verify OTP</button>
                                </form>
                               
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            {% include 'includes/footer.html' %}
        </main>
    </div>
    <script id="__NEXT_DATA__" type="application/json"></script>
</body>

</html>
